<svg width="192" height="192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" fill="#000000"/>
  
  <!-- Chess board -->
  <g>
    <rect x="20" y="20" width="152" height="152" fill="#8B4513" stroke="url(#goldGrad)" stroke-width="3"/>
    <g id="board">
      <!-- 8x8 board -->
      <rect x="20" y="20" width="19" height="19" fill="#f0d9b5"/>
      <rect x="39" y="20" width="19" height="19" fill="#b58863"/>
      <rect x="58" y="20" width="19" height="19" fill="#f0d9b5"/>
      <rect x="77" y="20" width="19" height="19" fill="#b58863"/>
      <rect x="96" y="20" width="19" height="19" fill="#f0d9b5"/>
      <rect x="115" y="20" width="19" height="19" fill="#b58863"/>
      <rect x="134" y="20" width="19" height="19" fill="#f0d9b5"/>
      <rect x="153" y="20" width="19" height="19" fill="#b58863"/>
      <!-- ... repeating pattern for 8 rows ... -->
    </g>
  </g>
  
  <!-- Knight piece on board -->
  <text x="96" y="100" font-size="80" text-anchor="middle" fill="url(#goldGrad)" font-weight="bold">♘</text>
  
  <!-- Title -->
  <text x="96" y="180" font-size="16" text-anchor="middle" fill="url(#goldGrad)" font-weight="bold" font-family="Arial">SWEET CHESS</text>
</svg>
